name: MPP Pattern Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write   # needed to post PR comments
  contents: read

jobs:
  pattern-check:
    name: Detect failure patterns in diff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install from repo (pre-release). Switch to:
      #   pip install mpp-patterns[semantic]
      # once published to PyPI.
      - name: Install mpp-patterns
        run: pip install -e ".[semantic]"

      - name: Generate diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" --unified=0 > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Run pattern check
        run: |
          python -m mpp.patterns.pr_check /tmp/pr.diff > /tmp/report.md || true
          cat /tmp/report.md

      - name: Post PR comment
        if: ${{ hashFiles('/tmp/report.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.md', 'utf8').trim();
            if (!report) {
              console.log('No pattern signals — nothing to comment.');
              return;
            }
            // Delete any previous mpp-check comment to avoid stacking
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.startsWith('## MPP Pattern Check')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report,
            });
