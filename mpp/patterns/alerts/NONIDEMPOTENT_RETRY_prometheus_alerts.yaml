#
# ── DATA CONSISTENCY PATTERN — NO PROMETHEUS ALERT POSSIBLE ──
#
# Pattern 'NONIDEMPOTENT_RETRY' (Non-idempotent retry on stateful operations) cannot be detected by a
# time-series metric alert. Its first observable signal is:
#
#   Duplicate entries appear in audit logs or database. Counts in reconciliation reports don't match expected totals.
#
# Required check type: reconciliation job
# A scheduled job must compare state across system boundaries and
# alert when values diverge. This cannot be expressed as PromQL.
#
# Diagnostic:
#   Are non-retryable error types (e.g., any error from a successful write that fails on response) explicitly excluded from the retry policy? Does every state-mutating operation require an idempotency key that is checked before execution, not just passed through?
#
# See card for countermeasures: mpp/patterns/cards/NONIDEMPOTENT_RETRY.json

