#
# ── DATA CONSISTENCY PATTERN — NO PROMETHEUS ALERT POSSIBLE ──
#
# Pattern 'CACHE_INVALIDATION_RACE' (Cache invalidation race without versioning) cannot be detected by a
# time-series metric alert. Its first observable signal is:
#
#   Inconsistent reads reported: different clients see different values for the same key. May appear in logs as unexpected state or in user reports as 'I see old data'.
#
# Required check type: reconciliation job
# A scheduled job must compare state across system boundaries and
# alert when values diverge. This cannot be expressed as PromQL.
#
# Diagnostic:
#   Do cache invalidation events include a version fence — i.e., does the cache write check that the value being written is newer than what is currently in the cache? Without version fencing, any delayed cache writer can overwrite a newer value.
#
# See card for countermeasures: mpp/patterns/cards/CACHE_INVALIDATION_RACE.json

