#
# ── DATA CONSISTENCY PATTERN — NO PROMETHEUS ALERT POSSIBLE ──
#
# Pattern 'LEADER_ELECTION_SPLIT_BRAIN' (Leader election split-brain from network partition) cannot be detected by a
# time-series metric alert. Its first observable signal is:
#
#   Downstream systems receive duplicate writes or conflicting updates. Sequence numbers diverge. Lock contention increases.
#
# Required check type: reconciliation job
# A scheduled job must compare state across system boundaries and
# alert when values diverge. This cannot be expressed as PromQL.
#
# Diagnostic:
#   Does every write from a leader include a monotonically increasing fencing token that the downstream rejects if it is lower than the last accepted token? Under simulated network partition (isolate the leader from the lease store), does the old leader stop writing before the new leader's first write?
#
# See card for countermeasures: mpp/patterns/cards/LEADER_ELECTION_SPLIT_BRAIN.json

